<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Retos Switch/Case</title>
</head>
<body>

  <!-- RETO 1 -->
  <h2>🚦 Reto 1 – Semáforo Inteligente</h2>
  <input id="color" type="text" placeholder="Escribe un color..." />
  <button onclick="verificar()">Verificar</button>
  <p id="resultado-semaforo"></p>

  <hr>

  <!-- RETO 2 -->
  <h2>🍎 Reto 2 – Clasificador de Frutas</h2>
  <input id="fruta" type="text" placeholder="Escribe una fruta..." />
  <button onclick="clasificar()">Clasificar</button>
  <p id="resultado-fruta"></p>

  <hr>

  <!-- RETO 3 -->
  <h2>🔢 Reto 3 – Traductor de Números</h2>
  <input id="numero" type="number" placeholder="Escribe 1, 2 ó 3..." />
  <button onclick="traducir()">Traducir</button>
  <p id="resultado-numero"></p>

  <hr>

  <!-- RETO 4 -->
  <h2>📝 Reto 4 – Calificador de Exámenes</h2>
  <input id="nota" type="text" placeholder="Escribe A, B ó C..." />
  <button onclick="calificar()">Calificar</button>
  <p id="resultado-nota"></p>

  <hr>

  <!-- RETO 5 -->
  <h2>🌍 Reto 5 – Saludo según el Idioma</h2>
  <input id="idioma" type="text" placeholder="Español, Inglés o Francés..." />
  <button onclick="saludar()">Saludar</button>
  <p id="resultado-idioma"></p>

  <script src="script.js"></script>
</body>
</html>
