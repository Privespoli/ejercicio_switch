<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Retos Switch/Case</title>
</head>
<body>

  <!-- RETO 1 -->
  <h2>Semáforo Inteligente</h2>
  <select id="color">
    <option value="">-- Elige un color --</option>
    <option value="Rojo">Rojo</option>
    <option value="Verde">Verde</option>
    <option value="Amarillo">Amarillo</option>
  </select>
  <button id="btn-semaforo">Verificar</button>
  <p id="resultado-semaforo"></p>



  <!-- RETO 2 -->
  <h2>Clasificador de Frutas</h2>
  <select id="fruta">
    <option value="">-- Elige una fruta --</option>
    <option value="Manzana">Manzana</option>
    <option value="Banana">Banana</option>
    <option value="Pera">Pera</option>
    <option value="Pizza">Pizza</option>
  </select>
  <button id="btn-fruta">Clasificar</button>
  <p id="resultado-fruta"></p>

  

  <!-- RETO 3 -->
  <h2>Traductor de Números</h2>
  <select id="numero">
    <option value="">-- Elige un número --</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
  </select>
  <button id="btn-numero">Traducir</button>
  <p id="resultado-numero"></p>

  

  <!-- RETO 4 -->
  <h2>Calificador de Exámenes</h2>
  <select id="nota">
    <option value="">-- Elige una nota --</option>
    <option value="A">A</option>
    <option value="B">B</option>
    <option value="C">C</option>
  </select>
  <button id="btn-nota">Calificar</button>
  <p id="resultado-nota"></p>

  

  <!-- RETO 5 -->
  <h2>Saludo según el Idioma</h2>
  <select id="idioma">
    <option value="">-- Elige un idioma --</option>
    <option value="Español">Español</option>
    <option value="Inglés">Inglés</option>
    <option value="Francés">Francés</option>
  </select>
  <button id="btn-idioma">Saludar</button>
  <p id="resultado-idioma"></p>

  <script src="script.js"></script>
</body>
</html>
